name: apply

on:
  push:
    branches: [main]

# Serializes cluster applies (semver push-CD design 8a.2): coalesced
# cd/deploy-train merges queue here rather than racing or superseding each
# other, so at most one `helmfile apply` is in flight. (Group name diverges
# from the spec's `cd-apply`; the existing name is kept - the property that
# matters is the serialized, non-cancelling queue.)
concurrency:
  group: tatara-helmfile-apply
  cancel-in-progress: false

jobs:
  helmfile-apply:
    runs-on: arc-runner-tatara-helmfile
    env:
      # Harbor uses the in-cluster kubernetes robot (robot$kubernetes) to pull the
      # OCI charts. The GH secret holds the LIVE working token (sourced from the
      # gitlab-runner ns `regcred`, which builds/pushes daily); the op .env copy
      # of this token was stale. GPG key is op-sourced (sops decrypt).
      GPG_PRIVATE_RSA_B64: ${{ secrets.GPG_PRIVATE_RSA_B64 }}
      HARBOR_USERNAME: ${{ secrets.HARBOR_ROBOT_KUBERNETES_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_ROBOT_KUBERNETES_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: mise install (helm/helmfile/kubectl/sops + plugins)
        run: |
          eval "$($HOME/.local/bin/mise activate bash)"
          mise install
          mise reshim

      - name: import GPG key (sops decrypt)
        run: |
          echo "$GPG_PRIVATE_RSA_B64" | base64 -d | gpg --batch --import

      - name: harbor OCI login
        run: |
          eval "$($HOME/.local/bin/mise activate bash)"
          printf '%s' "$HARBOR_PASSWORD" | helm registry login harbor.szymonrichert.pl -u "$HARBOR_USERNAME" --password-stdin

      - name: helmfile apply
        run: |
          eval "$($HOME/.local/bin/mise activate bash)"
          helmfile -e default apply --suppress-secrets

      # The Project + Repository enrollment CRs (and per-project scm Secrets) are
      # applied by the helmfile presync hook ONLY when a release actually syncs.
      # A no-op apply (releases already at target, e.g. the initial adoption)
      # skips sync -> the hook does not fire -> nothing is reconciled. Apply them
      # explicitly here so enrollment is deterministic on every run (idempotent;
      # in-cluster SA). Mirrors .hook.sh: plain manifests applied directly,
      # *.secrets.yaml sops-decrypted first (a raw kubectl apply of an encrypted
      # file fails with "unexpected GroupVersion string: ENC[...]").
      - name: reconcile enrollment CRs (Project + Repository + scm Secrets)
        run: |
          eval "$($HOME/.local/bin/mise activate bash)"
          find values/tatara-operator/raw -maxdepth 1 -name '*.yaml' ! -name '*.secrets.yaml' \
            -exec kubectl apply -f {} \;
          find values/tatara-operator/raw -maxdepth 1 -name '*.secrets.yaml' -print0 \
            | while IFS= read -r -d '' f; do sops -d "$f" | kubectl apply -f -; done
