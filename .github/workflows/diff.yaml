name: diff

on:
  pull_request:
    branches: [main]

jobs:
  helmfile-diff:
    runs-on: arc-runner-tatara-helmfile
    permissions:
      contents: read
      pull-requests: write
    env:
      # Harbor uses the in-cluster kubernetes robot (robot$kubernetes) to pull the
      # OCI charts. The GH secret holds the LIVE working token (sourced from the
      # gitlab-runner ns `regcred`, which builds/pushes daily); the op .env copy
      # of this token was stale. GPG key is op-sourced (sops decrypt).
      GPG_PRIVATE_RSA_B64: ${{ secrets.GPG_PRIVATE_RSA_B64 }}
      HARBOR_USERNAME: ${{ secrets.HARBOR_ROBOT_KUBERNETES_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_ROBOT_KUBERNETES_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: mise install (helm/helmfile/kubectl/sops + plugins)
        run: |
          eval "$($HOME/.local/bin/mise activate bash)"
          mise install
          mise reshim

      - name: import GPG key (sops decrypt)
        run: |
          echo "$GPG_PRIVATE_RSA_B64" | base64 -d | gpg --batch --import

      - name: harbor OCI login
        run: |
          eval "$($HOME/.local/bin/mise activate bash)"
          printf '%s' "$HARBOR_PASSWORD" | helm registry login harbor.szymonrichert.pl -u "$HARBOR_USERNAME" --password-stdin

      - name: helmfile diff
        id: diff
        continue-on-error: true
        run: |
          eval "$($HOME/.local/bin/mise activate bash)"
          set +e
          helmfile -e default diff --detailed-exitcode --suppress-secrets 2>&1 | tee diff.log
          set -e
          # Render the sticky-comment body to a file and pass it to the comment
          # action via `path:` (NOT an inline `message:` expression). A large
          # diff interpolated inline overflows the child-process arg/env limit
          # ("Argument list too long") and fails the job; GitHub also caps a
          # comment at 65536 chars. Strip ANSI and truncate to a safe size.
          sed 's/\x1b\[[0-9;]*m//g' diff.log > diff.clean.log
          MAX=60000
          {
            echo '## helmfile diff (`-e default`)'
            echo
            echo '```diff'
            if [ "$(wc -c < diff.clean.log)" -gt "$MAX" ]; then
              echo "[diff truncated to ${MAX} bytes; see the job log for the full output]"
              echo
              head -c "$MAX" diff.clean.log
            else
              cat diff.clean.log
            fi
            echo
            echo '```'
          } > diff-comment.md

      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: tatara-helmfile-diff
          recreate: true
          path: diff-comment.md
