# GitLab "infrastructure" Project + Repository CRs, codified via the
# tatara-project chart (replaces the old raw/project-infrastructure +
# repositories-infrastructure presync manifests). Behavior-preserving: spec
# values are identical to the manifests they replace. The infrastructure-scm
# Secret is still applied by the tatara-operator release presync (sops), not by
# this chart.
namespace: tatara

project:
  name: infrastructure
  spec:
    scmSecretRef: infrastructure-scm
    triggerLabel: tatara
    # STAGE-1 token-conservation re-enable (2026-07-04): held at 0 (tatara-only
    # observation + validates the maxConcurrentTasks=0 full-pause fix live).
    # Restore to 5 at steady state (Stage 2c).
    maxConcurrentTasks: 0
    # Above maxConcurrentTasks so the hourly brainstorm always has a creation slot.
    maxOpenTasks: 6
    agent:
      # Per-kind tiering (token-conservation component 1): project-wide fallback
      # is Opus/high; only triageIssue+review drop to Sonnet with low/medium
      # effort. All other kinds inherit the high fallback. xhigh->high where it
      # stays Opus.
      effort: high
      model: claude-opus-4-8
      modelByKind:
        triageIssue: claude-sonnet-5
        review: claude-sonnet-5
      effortByKind:
        triageIssue: low
        review: medium
      image: harbor.szymonrichert.pl/containers/tatara-claude-code-wrapper:1023483
      # Per-Task cumulative output-token runaway backstop for the turn-uncapped
      # implement/issueLifecycle kinds. TUNE from the component-6 per-kind token
      # telemetry; this is a safety ceiling, not a cost lever.
      maxTaskTokens: 3000000
      maxTurnsPerTask: 100
      permissionMode: bypassPermissions
      # Pin the agent-skills install to a SHA (kills the `main` drift; component 5
      # / component 4b). Bump deliberately alongside a skills change.
      skillsRef: 5eab53c9092ba0c8b776fa45f8a266a1d3ad70cc
      turnTimeoutSeconds: 2700
    # Read-only Grafana incident-response: operator provisions a per-project
    # grafana-mcp (Viewer SA token) + an alert-webhook receiver at
    # /operator/webhooks/infrastructure/grafana. Secret keys: serviceAccountToken
    # (mounted into grafana-mcp) + webhookSecret (alert bearer).
    grafana:
      enabled: true
      url: http://prometheus-grafana.monitoring.svc.cluster.local
      secretRef: infrastructure-grafana
    memory:
      neo4jStorage: 10Gi
      pgInstances: 3
      pgStorage: 10Gi
    scm:
      provider: gitlab
      owner: szymonrychu
      botLogin: szymonrychu-bot
      # Bot commit-author identity for agent commits (GitLab attributes commits to
      # the szymonrychu-bot account by author email).
      botEmail: sz.ymonrychu@gmail.com
      # The owner is a trusted insider: issues opened by szymonrychu go through
      # normal triage/approval, not third-party autoapprove.
      # Issue #102: szymonrychu is the sole maintainer/approver AND sole human
      # reporter. reporterLogins drops issues/comments from anyone else (the bot
      # stays a trusted insider), closing the prompt-injection vector.
      maintainerLogins:
        - szymonrychu
      reporterLogins:
        - szymonrychu
      approvalLabel: tatara/awaiting-approval
      mergePolicy: afterApproval
      prReactionScope: labeledOrMentioned
      priorityLabel: tatara/priority
      cron:
        brainstorm:
          enabled: true
          # Project-wide cap summing open agent proposals across all 5 repos.
          maxOpenProposals: 10
          schedule: 0 * * * *
          # Activate the stale-proposal reaper (operator #199): auto-close bot
          # proposals with no human engagement after 14 days.
          staleProposalDays: 14
          sources:
            - docs
            - memory
            - internet
        issueScan:
          maxPerRepo: 1
          # Stretched hourly -> every 4h (token conservation); webhooks cover real
          # issue activity, so the backstop scan can be less frequent.
          schedule: 0 */4 * * *
        mrScan:
          maxPerRepo: 1
          # Stretched hourly -> every 2h (token conservation); webhooks cover MR
          # events, this is the CI/merge-progression backstop.
          schedule: 0 */2 * * *
        # Project refiner pre-step (opt-in: closedLookbackDays > 0). Before each
        # due scan cycle the operator runs an agent that triages open + recently-
        # closed issues across all repos: closes duplicates and already-
        # implemented proposals, tightens scope, splits too-broad issues, files
        # followups. The terminal sink the brainstorm lifecycle otherwise lacks.
        refine:
          closedLookbackDays: 30

repositories:
  - name: containers
    spec:
      url: "https://gitlab.com/szymonrychu/containers"
      defaultBranch: main
      ingestEnabled: true
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
  - name: charts
    spec:
      url: "https://gitlab.com/szymonrychu/charts"
      defaultBranch: main
      ingestEnabled: true
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
  - name: helmfile
    spec:
      url: "https://gitlab.com/szymonrychu/helmfile"
      defaultBranch: main
      ingestEnabled: true
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
  - name: terraform
    spec:
      url: "https://gitlab.com/szymonrychu/terraform"
      defaultBranch: main
      ingestEnabled: true
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
  - name: ansible
    spec:
      url: "https://gitlab.com/szymonrychu/ansible"
      defaultBranch: main
      ingestEnabled: true
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
