# OIDC issuer was de-baked from the chat chart in the 2026-06-15 audit (rule 14);
# supply the cluster issuer here so chat can validate tokens (same realm as the
# operator). oidcAudience keeps the chart default "tatara-chat".
oidcIssuer: "https://auth.szymonrichert.pl/realms/master"

ingress:
  enabled: true
  host: tatara.szymonrichert.pl
  path: /api/v1/chat
  # className + clusterIssuer were de-baked from the chart (rule 14); supply the
  # cluster values so ingress routing (nginx) + the cert-manager TLS cert survive.
  className: nginx
  clusterIssuer: letsencrypt-prod

# cnpg postgres (cloudnative-pg/cluster subchart, alias 'postgres'): scale to 3
# instances (1 primary + 2 replicas) for HA - a probe-kill or unclean restart
# fails over instead of wedging the sole primary (mem-infrastructure incident
# 2026-06-25: single-instance pg wedged in end-of-recovery checkpoint on stale
# CephFS write-caps, full outage with no failover).
postgres:
  cluster:
    instances: 3
