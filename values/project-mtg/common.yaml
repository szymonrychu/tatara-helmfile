# mtg Project + Repository CRs, codified via the tatara-project chart.
# First project wired to an in-cluster generic MCP server via
# spec.agent.mcpServers (reaches the spellslinger MCP HTTP service; no
# spellslinger code lives in tatara itself).
namespace: tatara

project:
  name: mtg
  spec:
    scmSecretRef: tatara-scm
    triggerLabel: mtg
    maxConcurrentAgents: 2
    maxOpenTasks: 3
    # 4h pod life: the repo's longest Workflow research pipeline runs ~3h in a
    # single turn; the 3600 default TTL-stopped it mid-run.
    agentPodTTLSeconds: 14400
    agent:
      effort: high
      model: claude-opus-4-8
      # clarify + review pinned to opus explicitly (not left to the code
      # default) so a future kindDefaultModel change can't silently downgrade
      # them; both inherit project-default effort: high.
      modelByKind:
        clarify: claude-opus-4-8
        review: claude-opus-4-8
      image: harbor.szymonrichert.pl/containers/tatara-claude-code-wrapper:v1.2.0
      maxTaskTokens: 2000000
      # 400: deck skills run multi-agent research/sim pipelines up to ~3h; 150
      # starved multi-deck tasks. No unlimited exists (0 falls back to the 300
      # default), so this is the effective "do not starve" ceiling.
      maxTurnsPerTask: 400
      permissionMode: bypassPermissions
      skillsRef: v1.5.2
      # Inactivity window, not wall-clock: a streaming 3h Workflow run is safe,
      # but give long quiet Workflow phases a full hour before calling a stall.
      turnTimeoutSeconds: 3600
      # mtg-decks ships its own workflow skills (no profiles: frontmatter ->
      # wildcard -> installed for every agent kind). Cloned with the project's
      # scmSecretRef token via the wrapper's global GIT_TOKEN credential helper.
      skillSources:
        - name: mtg-decks
          url: https://github.com/szymonrychu/mtg-decks
          ref: main
          subdir: .claude/skills
      # Deck work MUST go through the repo's own skills, never freeform. The "*"
      # text reaches every kind; the review text is additive on top of it.
      promptAppendByKind:
        "*": |
          All deck work in this repo MUST go through the repo's own workflow
          skills - never freeform. Brainstorm/brew a deck with build-deck,
          forge-deck, choose-archetype, meta-analysis, or set-impact. Optimize or
          tune a deck with optimize-deck, sideboard-guide, or prep-tournament.
          Review and risk-check with ban-watch and the research-protocol gates.
          These skills live in the mtg-decks checkout; run them from the repo root.
          Before any research pipeline, bootstrap the repo toolchain once:
          `mise install && mise run setup` at the mtg-decks repo root (provides
          python + matplotlib and the graphviz dot shim that preflight requires).
          PDF export is optional: generate one only if the human explicitly
          asked; skipping it otherwise is normal, not a degradation.
        review: |
          As reviewer, be critical but fair. A multi-level review is expected:
          design, decklist choices, simulation evidence, and page structure.
          Catch problems early and hand concrete findings back to the implementor
          to fix. Do not wave work through, and do not nitpick style.
      # The generic per-Project MCP injection: reaches the in-cluster
      # spellslinger MCP HTTP service. No spellslinger code in tatara.
      mcpServers:
        - name: spellslinger
          url: http://spellslinger-mcp-http.spellslinger-development.svc.cluster.local:8080/mcp
          type: http
    scm:
      provider: github
      owner: szymonrychu
      botLogin: szymonrychu-bot
      botEmail: 143486966+szymonrychu-bot@users.noreply.github.com
      maintainerLogins:
        - szymonrychu
      reporterLogins:
        - szymonrychu
      mergePolicy: afterApproval
      prReactionScope: labeledOrMentioned
      cron:
        issueScan:
          maxPerRepo: 1
          schedule: 0 */4 * * *

repositories:
  - name: mtg-decks
    spec:
      url: "https://github.com/szymonrychu/mtg-decks"
      defaultBranch: main
      ingestEnabled: true
      # tatara-project chart requires a 5-field reingestSchedule cron on every
      # Repository entry; not called out in the brief. Same cadence as the
      # project-tatara repos.
      reingestSchedule: "0 6 * * *"
