# Manager replicas: 3 for HA (leaderElection:true -> 1 active, 2 standby).
replicaCount: 3

ingress:
  enabled: true
  host: tatara.szymonrichert.pl
  # path "/" lets the operator own /operator/webhooks and the REST routes
  # internally (no rewrite double-strip). Confirm against
  # internal/webhook/server.go route prefix before apply; adjust path and
  # externalWebhookBase together if the operator registers routes under a
  # sub-prefix.
  path: /
  className: nginx

# External base used to render Project.status.webhookURL. Must match the public
# host + the operator's internal webhook route prefix.
externalWebhookBase: "https://tatara.szymonrichert.pl/operator/webhooks"

# Callback URL: the internal Service the wrapper POST-s turn results to.
# Must match the tatara-operator-internal Service DNS + INTERNAL_ADDR port.
callbackUrl: "http://tatara-operator-internal.tatara.svc:8082"

# Per-Project memory Ingress placement (operator-stamps these at runtime). The
# 2026-06-15 audit de-baked these from the chart (rule 14); supply them here so
# operator-created memory ingresses keep nginx routing + the path rewrite the
# chart used to hardcode. ingressClassName feeds the ConfigMap INGRESS_CLASS_NAME
# (distinct from the operator's own chart Ingress .ingress.className above).
ingressClassName: "nginx"
ingressRewriteTarget: "/$2"

# Agent (wrapper) Pod securityContext + placement. The 2026-06-15 audit defaulted
# agentRunAsNonRoot=true with an empty runAsUser; the wrapper image declares a
# NON-NUMERIC USER ("agent", uid 10001 via useradd), so kubelet cannot verify
# non-root and rejects every agent pod (CreateContainerConfigError). Pin the
# numeric UID so runAsNonRoot can be verified. As of operator c6b315f the chart
# defaults agentRunAsNonRoot=false (cluster-agnostic), so the helmfile opts into
# non-root here by setting BOTH the flag and the numeric uid (the chart fail-renders
# if the flag is true without a uid). Keep agent pods OFF the untainted control-plane
# nodes by pinning to the nas worker (label nas=true).
agentRunAsNonRoot: true
agentRunAsUser: 10001
agentScheduling:
  nodeSelector:
    nas: "true"

# Per-Project memory stack images (the operator stamps these into the native
# objects it provisions per Project). memoryBaseUrl removed in N4: each Project
# now exposes its own endpoint via status.memory.endpoint.
memoryImage: "harbor.szymonrichert.pl/containers/tatara-memory:02bbd15"
lightragImage: "harbor.szymonrichert.pl/proxy-ghcr/hkuds/lightrag@sha256:67ccf8d9f74eb29da872bf8b3e6513605f5ac601fb0509c5b0ca16d98d2d307d"
neo4jImage: "neo4j:2026.04.0"
# Read-only grafana-mcp the operator provisions per Project that enables
# spec.grafana (incident-response). Pinned to the version already proven in this
# cluster (ai/grafana-mcp). Operator stamps it into GRAFANA_MCP_IMAGE.
grafanaMcpImage: "grafana/mcp-grafana:0.11.4"
# Shared OpenAI Secret (ns tatara, key LLM_BINDING_API_KEY) every per-Project
# lightrag reads. Created out-of-band (gated step in N4 runbook).
openaiSecretName: "lightrag-openai"

# In-cluster service endpoints.
oidcIssuer: "https://auth.szymonrichert.pl/realms/master"
oidcAudience: "tatara-operator"
operatorOidcClientId: "tatara-operator"

# Secret names the operator references (cluster-managed, not chart-rendered).
anthropicSecretName: "tatara-anthropic"
cliOidcSecretName: "tatara-cli-oidc"
scmSecretName: "tatara-scm"

# imagePullSecret: cluster-specific pull secret for operator-spawned workloads
# (neo4j, lightrag, tatara-memory, cnpg Cluster). Harbor's proxy-dockerhub
# requires authentication; regcred is the standard pull secret in this cluster.
imagePullSecret: "regcred"

# Ingester image the ingest Job runs (must be published to harbor first).
ingesterImage: "harbor.szymonrichert.pl/containers/tatara-memory-repo-ingester:11912dd"

# S3 conversation persistence (issue #114). The operator + wrapper store/restore
# each issue's Claude conversation transcript in this bucket so a fresh pod
# resumes the prior conversation. The bucket + creds are provisioned by the
# rook-ceph ObjectBucketClaim in raw/conversation-bucket.tatara-operator.pre.yaml
# (which auto-creates Secret tatara-conversations holding
# AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY). The feature stays off until the
# operator + wrapper images are bumped to a build carrying the #114 code (chart
# pin in helmfile.yaml.gotmpl + image.tag in common.yaml); the currently-pinned
# published builds ignore these keys, so wiring them now is forward-compatible.
#
# VERIFY at deploy (tatara-deploy-harness): s3Endpoint must be the rook-ceph RGW
# service the OBC reports in its generated ConfigMap (BUCKET_HOST:BUCKET_PORT).
# The value below is the conventional rook-ceph pattern; confirm the object-store
# name and port against the live cluster.
s3Endpoint: "http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc"
s3Bucket: "tatara-conversations"
# Ceph RGW ignores the region but the AWS SDK requires one for request signing.
s3Region: "us-east-1"
# Namespacing within the bucket; the wrapper prepends this to every object key.
s3KeyPrefix: "conversations"
# Ceph RGW (and MinIO) need path-style addressing; AWS S3 would use false.
s3ForcePathStyle: true
# The OBC-generated Secret (same name as the OBC) holding the AWS_* creds.
s3SecretName: "tatara-conversations"
