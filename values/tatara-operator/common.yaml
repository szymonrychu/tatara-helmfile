# Cluster-specific values the chart does not bake (rule 14). The operator chart
# has no subcharts, so the only passthrough is the image tag pin. The regcred
# pull secret reaches the manager Deployment from the bucket values/common.yaml
# (imagePullSecrets), same as the other tatara releases.
image:
  # g-sha recovery pin: semver release (vX.Y.Z) is down platform-wide while
  # TATARA_CD_TOKEN is expired (cd-release tag job 401). ci-shared.yml still
  # publishes the :<short-sha> image on push to main. Re-pin to semver once the
  # token is rotated and releases resume. Operator main 26098cd (#277, role-harness plugins).
  tag: "v0.10.0"
