# Repository CRs enrolled in the GitLab "infrastructure" Project. The
# operator's projectReposForScan discovers these on the next cron and begins
# issue/MR scans + scheduled re-ingest. Applied by .hook.sh presync of the
# tatara-operator release (filename matches *.tatara-operator.pre.yaml).
#
# All are public gitlab.com repos under szymonrychu; ingest clones
# them with the infrastructure-scm token (works without it for public, but
# the operator wires it for parity).
apiVersion: tatara.dev/v1alpha1
kind: Repository
metadata:
  name: containers
  namespace: tatara
spec:
  projectRef: infrastructure
  url: "https://gitlab.com/szymonrychu/containers"
  defaultBranch: main
  ingestEnabled: true
  semanticIngest: true
  reingestSchedule: "0 6 * * *"
