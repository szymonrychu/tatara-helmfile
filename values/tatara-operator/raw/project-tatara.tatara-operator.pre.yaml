apiVersion: tatara.dev/v1alpha1
kind: Project
metadata:
  name: tatara
  namespace: tatara
spec:
  agent:
    image: harbor.szymonrichert.pl/containers/tatara-claude-code-wrapper:604e107
    maxTurnsPerTask: 50
    model: claude-opus-4-8
    permissionMode: bypassPermissions
    turnTimeoutSeconds: 1800
  # Per-repo fan-out: lanes run up to maxConcurrentTasks agents at once across all
  # repos (was 2; raised to 3 with the per-repo-lane scan model).
  maxConcurrentTasks: 5
  memory:
    neo4jStorage: 10Gi
    pgInstances: 1
    pgStorage: 10Gi
  scm:
    approvalLabel: tatara/awaiting-approval
    # Third-party (non-bot, non-maintainer) issues auto-advance through discovery
    # but still wait for the maintainer before implementation.
    autoApproveThirdParty: brainstorming
    botLogin: szymonrychu-bot
    cron:
      brainstorm:
        enabled: true
        # Project-wide cap (operator dc7c631+: brainstorm is one-per-project per
        # cycle; maxOpenProposals sums open agent proposals across ALL repos). 8
        # ~= one per repo for the 8-repo project.
        maxOpenProposals: 8
        schedule: 0 * * * *
        sources:
          - docs
          - memory
          - internet
      # Repo-health audit (one repo per cycle, stale-first rotation). Offset 30
      # min from brainstorm (0 * * * *) so the two project-scoped activities
      # never fire in the same reconcile. maxOpenFindings shares the
      # brainstorming-labeled proposal backlog with brainstorm; 8 ~= one per repo.
      healthCheck:
        enabled: true
        maxOpenFindings: 8
        schedule: 30 * * * *
      # Per-repo backpressured brainstorm (hourly): skip a repo with >= 3 open
      # unapproved agent proposals, else start one brainstorm. maxPerCycle is
      # retired (rate is fixed 1/repo/cycle). CRD carries maxOpenProposals.
      issueScan:
        maxPerRepo: 1
        schedule: 0 * * * *
      mrScan:
        maxPerRepo: 1
        schedule: 0 * * * *
    mergePolicy: afterApproval
    owner: szymonrychu
    prReactionScope: labeledOrMentioned
    priorityLabel: tatara/priority
    provider: github
  scmSecretRef: tatara-scm
  triggerLabel: tatara
