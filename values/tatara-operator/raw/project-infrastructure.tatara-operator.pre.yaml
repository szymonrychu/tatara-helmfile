# GitLab "infrastructure" Project: enrolls szymonrychu's homelab infra repos
# (containers, charts, helmfile) into tatara. Provider is GitLab; the agent
# loop (brainstorm + issue/MR scans + reactive handling) writes back as
# szymonrychu-bot via the api-scoped PAT in the infrastructure-scm Secret.
# Applied by .hook.sh presync of tatara-operator (filename matches
# *.tatara-operator.pre.yaml). Repository CRs live in
# repositories-infrastructure.tatara-operator.pre.yaml.
#
# The operator provisions a dedicated per-project memory stack (pg + neo4j)
# for this Project; sized smaller than tatara (3 repos, single pg instance).
apiVersion: tatara.dev/v1alpha1
kind: Project
metadata:
  name: infrastructure
  namespace: tatara
spec:
  agent:
    # Grafana-capable wrapper (registers the per-project grafana-mcp from
    # TATARA_GRAFANA_MCP_URL); required for spec.grafana to be useful.
    image: harbor.szymonrichert.pl/containers/tatara-claude-code-wrapper:cc1d7db
    maxTurnsPerTask: 50
    model: claude-opus-4-8
    permissionMode: bypassPermissions
    turnTimeoutSeconds: 1800
  # Read-only Grafana incident-response: operator provisions a per-project
  # grafana-mcp (Viewer SA token) + an alert-webhook receiver at
  # /operator/webhooks/infrastructure/grafana. Secret keys: serviceAccountToken
  # (mounted into grafana-mcp) + webhookSecret (alert bearer).
  grafana:
    enabled: true
    url: http://prometheus-grafana.monitoring.svc.cluster.local
    secretRef: infrastructure-grafana
  maxConcurrentTasks: 3
  # Above maxConcurrentTasks so the hourly brainstorm always has a creation slot.
  maxOpenTasks: 4
  memory:
    neo4jStorage: 10Gi
    pgInstances: 1
    pgStorage: 10Gi
  scm:
    approvalLabel: tatara/awaiting-approval
    botLogin: szymonrychu-bot
    cron:
      brainstorm:
        enabled: true
        # Project-wide cap summing open agent proposals across all 3 repos.
        maxOpenProposals: 3
        schedule: 0 * * * *
        sources:
          - docs
          - memory
          - internet
      issueScan:
        maxPerRepo: 1
        schedule: 0 * * * *
      mrScan:
        maxPerRepo: 1
        schedule: 0 * * * *
    # The owner is a trusted insider: issues opened by szymonrychu go through
    # normal triage/approval, not third-party autoapprove.
    maintainerLogins:
      - szymonrychu
    mergePolicy: afterApproval
    owner: szymonrychu
    prReactionScope: labeledOrMentioned
    priorityLabel: tatara/priority
    provider: gitlab
  scmSecretRef: infrastructure-scm
  triggerLabel: tatara
