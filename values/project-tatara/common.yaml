# tatara Project + Repository CRs, codified via the tatara-project chart
# (replaces the old raw/project-tatara + repositories-tatara presync manifests).
# Behavior-preserving: spec values are identical to the manifests they replace.
namespace: tatara

project:
  name: tatara
  spec:
    scmSecretRef: tatara-scm
    triggerLabel: tatara
    # item-4a activation: requires tatara-operator >= the release that ships
    # Project.spec.autoApproveTataraProposals (CRD field). Do not apply this
    # chart bump before that operator release is merged and published.
    autoApproveTataraProposals: true
    # Per-repo fan-out: lanes run up to maxConcurrentAgents agents at once across
    # all repos.
    # Realistic steady-state (2026-07-04): full concurrency + brainstorm on, to
    # observe whether the tiering/effort/cadence improvements slow subscription
    # burn vs the pre-improvement runaway.
    maxConcurrentAgents: 5
    # Creation budget (non-terminal Task cap). Set above maxConcurrentAgents so the
    # hourly brainstorm always has a creation slot.
    maxOpenTasks: 6
    agent:
      # Per-kind tiering (token-conservation component 1): project-wide fallback
      # is Opus/high; only clarify+review drop to Sonnet with low/medium
      # effort. All other kinds (brainstorm, refine, implement, incident,
      # documentation) inherit the high fallback. xhigh->high everywhere it
      # stays Opus.
      effort: high
      model: claude-opus-4-8
      modelByKind:
        clarify: claude-sonnet-5
        review: claude-sonnet-5
      effortByKind:
        clarify: low
        review: medium
      image: harbor.szymonrichert.pl/containers/tatara-claude-code-wrapper:v1.0.17
      # Per-Task cumulative output-token runaway backstop for the turn-uncapped
      # implement/issueLifecycle kinds. TUNE from the component-6 per-kind token
      # telemetry; this is a safety ceiling, not a cost lever.
      maxTaskTokens: 3000000
      maxTurnsPerTask: 100
      permissionMode: bypassPermissions
      # Pin the agent-skills install (kills the `main` drift; component 5
      # / component 4b). CD-managed: tatara-agent-skills release.yml rewrites
      # this to each freshly cut tag. Do not hand-edit.
      skillsRef: v1.5.2
      turnTimeoutSeconds: 2700
    # Read-only Grafana incident-response: the operator provisions a per-project
    # grafana-mcp (Viewer SA token) + an alert-webhook receiver at
    # /operator/webhooks/tatara/grafana. Secret keys: serviceAccountToken (mounted
    # into grafana-mcp) + webhookSecret (the bearer the Grafana Tatara contact point
    # presents). Mirrors the infrastructure Project; the SA token + webhookSecret are
    # reused from infrastructure (same read-only Viewer), webhookSecret must equal
    # TF_VAR_tatara_webhook_secret in terraform/grafana.
    grafana:
      enabled: true
      url: http://prometheus-grafana.monitoring.svc.cluster.local
      secretRef: tatara-grafana
    # Post-merge documentation agent: a merge to any enrolled component's
    # default branch spawns a documentation Task that updates the central docs
    # repo (tatara-documentation, already enrolled below) if the change is
    # doc-relevant, opening an auto-merge MR gated on mkdocs build --strict.
    documentation:
      enabled: true
      repo: "https://github.com/szymonrychu/tatara-documentation"
    memory:
      neo4jStorage: 10Gi
      pgInstances: 3
      # 2026-07-06 incident: a WAL burst during a standby resync overran the
      # operator-default 2Gi WAL volume (max_wal_size 1Gi + max_slot_wal_keep_size
      # 1Gi leaves no headroom), crashlooping both replicas. Sized to 10Gi. Data
      # bumped 10->20Gi in the 2026-07-05 WAL-fill incident; re-asserted here.
      pgStorage: 20Gi
      pgWalStorage: 10Gi
    scm:
      provider: github
      guidance: >-
        This project is self-hosting: its repositories (the tatara operator,
        cli, wrapper, memory, ingester, and helmfile) ARE the autonomous-agent
        platform you and the other agents run on. Treat the operational
        infrastructure as in-scope, not only application features: the helm
        charts, the tatara-helmfile releases and deploy pipeline, the CI
        workflows and build tooling, the k8s/ARC-runner/Ceph/memory-backend
        configuration, and the incidents recorded in each repository's
        MEMORY.md. When you find a recurring operational failure or a gap in
        the platform's reliability or observability, propose improvements to
        that infrastructure.
      owner: szymonrychu
      botLogin: szymonrychu-bot
      # Bot commit-author identity for agent commits (GitHub noreply links commits
      # to the szymonrychu-bot account by author email).
      botEmail: 143486966+szymonrychu-bot@users.noreply.github.com
      # Issue #102: szymonrychu is the sole trusted maintainer/approver AND the
      # sole human reporter. maintainerLogins makes only his comment count as the
      # approval go-ahead; reporterLogins drops issues/comments from anyone else
      # (the bot stays a trusted insider, so autonomous brainstorm/health-check
      # issues still flow), closing the prompt-injection vector.
      maintainerLogins:
        - szymonrychu
      reporterLogins:
        - szymonrychu
      mergePolicy: afterApproval
      prReactionScope: labeledOrMentioned
      priorityLabel: tatara/priority
      cron:
        brainstorm:
          enabled: true
          # Project-wide cap summing open agent proposals across ALL repos.
          maxOpenProposals: 10
          schedule: 0 6 * * *
          # Activate the stale-proposal reaper (operator #199): auto-close bot
          # proposals with no human engagement after 14 days.
          staleProposalDays: 14
          sources:
            - docs
            - memory
            - internet
        issueScan:
          maxPerRepo: 1
          # Stretched hourly -> every 4h (token conservation); webhooks cover real
          # issue activity, so the backstop scan can be less frequent.
          schedule: 0 */4 * * *
        # Project refiner pre-step (opt-in: closedLookbackDays > 0). Before each
        # due scan cycle the operator runs an agent that triages open + recently-
        # closed issues across all repos: closes duplicates and already-
        # implemented proposals, tightens scope, splits too-broad issues, files
        # followups. The terminal sink the brainstorm lifecycle otherwise lacks.
        refine:
          closedLookbackDays: 30
        documentation:
          schedule: 0 3 * * *

repositories:
  # tatara docs repo dropped 2026-07-07: it is private and szymonrychu-bot is
  # not a collaborator, so every clone 404s (`git clone ... tatara: exit 128`).
  # It sorted first (prefix of all tatara-*) so it was the deterministic primary
  # repo (projectscan.go sort-by-name) -> project-scoped refine/brainstorm/docs
  # tasks BootCrashLoop on the primary clone. Removing it makes tatara-agent-skills
  # the new (bot-clonable) primary. Re-add only if the bot is granted access.
  - name: tatara-helmfile
    spec:
      url: "https://github.com/szymonrychu/tatara-helmfile"
      defaultBranch: main
      ingestEnabled: true
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
  - name: tatara-memory
    spec:
      url: "https://github.com/szymonrychu/tatara-memory"
      defaultBranch: main
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
  - name: tatara-cli
    spec:
      url: "https://github.com/szymonrychu/tatara-cli"
      defaultBranch: main
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
  - name: tatara-operator
    spec:
      url: "https://github.com/szymonrychu/tatara-operator"
      defaultBranch: main
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
  - name: tatara-chat
    spec:
      url: "https://github.com/szymonrychu/tatara-chat"
      defaultBranch: main
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
  - name: tatara-memory-repo-ingester
    spec:
      url: "https://github.com/szymonrychu/tatara-memory-repo-ingester"
      defaultBranch: main
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
  - name: tatara-claude-code-wrapper
    spec:
      url: "https://github.com/szymonrychu/tatara-claude-code-wrapper"
      defaultBranch: main
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
  - name: tatara-observability
    spec:
      url: "https://github.com/szymonrychu/tatara-observability"
      defaultBranch: main
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
  - name: tatara-documentation
    spec:
      url: "https://github.com/szymonrychu/tatara-documentation"
      defaultBranch: main
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
  - name: tatara-agent-skills
    spec:
      url: "https://github.com/szymonrychu/tatara-agent-skills"
      defaultBranch: main
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
