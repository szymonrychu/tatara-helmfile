      reingestSchedule: "0 6 * * *"
  - name: tatara-memory-repo-ingester
    spec:
      url: "https://github.com/szymonrychu/tatara-memory-repo-ingester"
      defaultBranch: main
      semanticIngest: true
      reingestSchedule: "0 6 * * *"
  - name: tatara-claude-code-wrapper
